<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Renew Vault  Never miss an important renewal again">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="180" fill="#FFFFFF" opacity="0.06"/>
  <circle cx="200" cy="520" r="140" fill="#FFFFFF" opacity="0.05"/>
  <!-- Logo mark -->
  <g transform="translate(120, 165)">
    <circle cx="80" cy="80" r="72" fill="#2563EB"/>
    <path d="M80 32l48 20v52c0 35-48 72-48 72s-48-37-48-72V52z" fill="url(#shield)" stroke="#FFFFFF" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="130" cy="130" r="22" fill="#22C55E"/>
    <path d="M120 130l8 8 16-18" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="280" y="220" fill="#FFFFFF" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="72" font-weight="700">Renew Vault</text>
  <text x="280" y="300" fill="#DBEAFE" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="36" font-weight="400">Never miss an important renewal again.</text>
  <text x="280" y="380" fill="#BFDBFE" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="24">Warranties · Insurance · Passports · Licences · Subscriptions</text>
  <rect x="280" y="420" width="280" height="56" rx="28" fill="#22C55E"/>
  <text x="420" y="457" fill="#FFFFFF" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">Google Play</text>
  <text x="280" y="530" fill="#93C5FD" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="18">com.renewvault.app · Local-first · Encrypted on device</text>
</svg>
