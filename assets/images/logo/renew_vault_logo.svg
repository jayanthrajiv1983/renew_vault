<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Renew Vault">
  <defs>
    <linearGradient id="rv-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="rv-shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EFF6FF"/>
    </linearGradient>
  </defs>

  <!-- Circular badge background -->
  <circle cx="256" cy="256" r="232" fill="url(#rv-bg)"/>

  <!-- Renewal refresh ring -->
  <path
    d="M 256 56
       A 200 200 0 1 1 120 340"
    fill="none"
    stroke="#F59E0B"
    stroke-width="18"
    stroke-linecap="round"/>
  <polygon
    points="120,340 96,360 130,372"
    fill="#F59E0B"/>

  <!-- Shield -->
  <path
    d="M 256 108
       L 352 148
       L 352 252
       C 352 322 256 396 256 396
       C 256 396 160 322 160 252
       L 160 148
       Z"
    fill="url(#rv-shield)"
    stroke="#2563EB"
    stroke-width="6"
    stroke-linejoin="round"/>

  <!-- Calendar header bar -->
  <rect x="196" y="188" width="120" height="32" rx="6" fill="#2563EB"/>
  <rect x="196" y="212" width="120" height="96" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="4"/>

  <!-- Calendar binding rings -->
  <rect x="218" y="178" width="8" height="20" rx="3" fill="#1D4ED8"/>
  <rect x="256" y="178" width="8" height="20" rx="3" fill="#1D4ED8"/>
  <rect x="294" y="178" width="8" height="20" rx="3" fill="#1D4ED8"/>

  <!-- Calendar date dots -->
  <circle cx="218" cy="244" r="7" fill="#2563EB" opacity="0.35"/>
  <circle cx="256" cy="244" r="7" fill="#2563EB" opacity="0.35"/>
  <circle cx="294" cy="244" r="7" fill="#2563EB" opacity="0.35"/>
  <circle cx="218" cy="278" r="7" fill="#2563EB" opacity="0.35"/>
  <circle cx="256" cy="278" r="7" fill="#22C55E"/>
  <circle cx="294" cy="278" r="7" fill="#2563EB" opacity="0.35"/>

  <!-- Checkmark badge -->
  <circle cx="340" cy="340" r="44" fill="#22C55E"/>
  <path
    d="M 318 340 L 334 356 L 364 322"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
